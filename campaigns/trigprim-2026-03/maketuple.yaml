version: "0.8.1"

input:
    streaming: False

output:
    mode: merge
    name: "{dune_mc.gen_fcl_filename}__{dune.campaign}__{dune.config_file}__{core.application.name}__{core.application.version}__{merge.cfg}__{DUNESW_VERSION}"
    namespace: "usertests"
    out_dir: "/pnfs/dune/scratch/users/{$USER}/merge_test/triggerAna"

validation:
    handling:
        unreachable: "skip"

grouping:
    mode: count
    target: 100
    equalize: False
    chunk_max: 10

method:
    method_name: "lar"
    cmd: "lar -c {cfg} -n -1 {inputs} -T {output}"
    cfg: "triggersim_triggerana_dune10kt_1x2x2.fcl"
    outputs:
      - name: "{NAME}__{merge.cfg}__{UUID}__tuple.root"
        metadata: {"core.file_format": "root", "code.data_tier":"root-tuple"}
sites:
    site_distances:                       # Distance offsets for merging sites
        default: .inf                     # Do not allow merging except at specified sites
        "US_FNAL-FermiGrid": -5.0         # Increase priority
        "CERN": 0.0